name: "Auto Deploy with Version"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ========== 获取版本信息 ==========
      - name: Get version info
        id: version
        run: |
          # 如果是 tag 推送，使用 tag 名作为版本号；否则使用 commit SHA
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="dev"
          fi
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

          BUILD_TIME=$(date -u +"%Y-%m-%d %H:%M:%S")
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

          echo "📦 Version: $VERSION"
          echo "🕐 Build Time: $BUILD_TIME"
          echo "🔨 Commit: ${GITHUB_SHA::7}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      # ========== 构建（注入版本信息） ==========
      - name: Build the project
        run: npm run build
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.tag }}
          VITE_APP_BUILD_TIME: ${{ steps.version.outputs.build_time }}
          VITE_APP_COMMIT_SHA: ${{ steps.version.outputs.sha }}

      # ========== 部署到 WebDAV ==========
      - name: Upload to WebDAV
        uses: weijia/action-upload-webdav@master
        with:
          webdav-url: ${{ secrets.WEBDAV_URL }}
          webdav-username: ${{ secrets.WEBDAV_USERNAME }}
          webdav-password: ${{ secrets.WEBDAV_PASSWORD }}
          webdav-root: online/${{ github.event.repository.name }}
          source-directory: ./dist
          copy-to-latest: 'true'

      # ========== 部署到 GitHub Pages ==========
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy-pages:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
